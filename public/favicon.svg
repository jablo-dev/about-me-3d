<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="15" fill="url(#bgGradient)"/>

  <!-- Glow effect -->
  <rect width="100" height="100" rx="15" fill="none" stroke="url(#codeGradient)" stroke-width="2" opacity="0.5"/>

  <!-- Code brackets -->
  <text x="50" y="65" font-family="monospace" font-size="48" font-weight="bold" fill="url(#codeGradient)" text-anchor="middle">&lt;/&gt;</text>
</svg>

